version: "3.9"

services:
  # ── Python / FastAPI sentiment backend ──────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env           # create from backend/.env.example
    environment:
      HOST: "0.0.0.0"
      PORT: "3001"
      # Override ALLOWED_ORIGINS in .env if your frontend lives elsewhere
      ALLOWED_ORIGINS: "http://localhost:3000"
    volumes:
      # SEC filings are downloaded at runtime; persist them across restarts
      - sec_data:/app/sec_data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # FinBERT model load takes ~30s on first start

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Tells the frontend build where the backend lives inside the Docker network
        SENTIRION_BACKEND_URL: "http://backend:3001"
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      SENTIRION_BACKEND_URL: "http://backend:3001"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  sec_data:
